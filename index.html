<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast - Vansh </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.4.2/css/all.css">
</head>
<body>
    <div class="main">
        <div class="container">
            <div class="nav">
                <div class="loc">
                    <h2 id="place">
                        <i class="fa-light fa-map-pin fa-sm" style="color: #1a1a1a; cursor: pointer;"></i>
                        <span id="city-name">Detecting location...</span>
                    </h2>
                </div>

                <div class="search-place">
                    <input type="text" placeholder="Enter Your Location" style="cursor: pointer;" class="enter-loc" id="">
                    <i class="fa-regular fa-magnifying-glass fa-xl" style="color: #1a1a1a; cursor: pointer;"></i>
                </div>

                <div class="date">
                    <h2 id="date"></h2>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
